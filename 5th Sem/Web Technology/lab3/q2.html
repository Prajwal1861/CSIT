<!DOCTYPE html>
<html>
<head>
    <title>Project Table</title>
    <style>
        .table {
            width: 80%;
            margin: auto;
            border: 1px solid black;
        }

        .row {
            display: flex;
        }

        .cell {
            flex: 1;
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        .header {
            font-weight: bold;
            background-color: #ddd;
        }
    </style>
</head>
<body>

<div class="table">
    <div class="row header">
        <div class="cell">Project ID</div>
        <div class="cell">Project Name</div>
        <div class="cell">Technology</div>
        <div class="cell">Duration</div>
    </div>

    <div class="row">
        <div class="cell">1</div>
        <div class="cell">E-Commerce</div>
        <div class="cell">HTML, CSS</div>
        <div class="cell">3 Months</div>
    </div>

    <div class="row">
        <div class="cell">2</div>
        <div class="cell">Library System</div>
        <div class="cell">PHP, MySQL</div>
        <div class="cell">2 Months</div>
    </div>
</div>

</body>
</html>
